<div class="flex flex-1 flex-col bg-fondo font-rubik">
  <div class="flex-none flex items-center p-8">
    <span class="text-2xl font-bold text-moradoclaro">Connect</span>
    <span class="text-2xl font-bold text-moradooscuro">Work</span>
  </div>

  <div class="flex flex-col flex-1 items-center justify-center">
    <app-login-form></app-login-form>
    <div class="flex gap-4 mt-8 justify-center">
      <button
        (click)="irRegistroFreelancer()"
        class="px-6 py-2 rounded-full border border-grisoscuro text-grisoscuro bg-white hover:bg-grisclaro transition cursor-pointer"
      >
        Registrarse como Freelancer
      </button>
      <button
        (click)="irRegistroCliente()"
        class="px-6 py-2 rounded-full border border-grisoscuro text-grisoscuro bg-white hover:bg-grisclaro transition cursor-pointer"
      >
        Registrarse como cliente
      </button>
    </div>
  </div>
</div>
