<div class="flex flex-1 flex-col bg-fondo font-rubik">
  <div class="flex-none flex items-center p-8">
    <span class="text-2xl font-bold text-moradoclaro">Connect</span>
    <span class="text-2xl font-bold text-moradooscuro">Work</span>
  </div>
  <div class="flex-1 flex flex-col items-center justify-center">

    
    <!-- Card de login -->
    <div
      class="relative w-full max-w-sm bg-white rounded-xl shadow-lg p-8 gap-2 flex flex-col items-center"
    >
      <h2 class="text-xl font-bold text-moradoclaro p-2">Iniciar Sesion</h2>
      <form (submit)="$event.preventDefault(); onSubmit()" class="w-full flex flex-col items-center">
        <input
          type="text"
          [value]="username()"
          (input)="username.set(txtUsername.value)"
          #txtUsername
          name="username"
          placeholder="Nombre de usuario / Correo"
          class="w-full mb-3 px-4 py-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />
        <input
          type="password"
          [value]="password()"
          (input)="password.set(txtPassword.value)"
          #txtPassword
          name="password"
          placeholder="Contraseña"
          class="w-full mb-3 px-4 py-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />
        <button
          type="submit"
          class="w-full py-2 rounded-full border-2 border-moradooscuro text-moradooscuro font-bold transition hover:bg-moradooscuro hover:text-white cursor-pointer"
        >
          Entrar
        </button>
      </form>
    </div>
    <!-- Botones secundarios -->
    <div class="flex gap-4 mt-8">
      <button
        class="px-6 py-2 rounded-full border border-grisoscuro text-grisoscuro bg-white hover:bg-grisclaro transition cursor-pointer" 
      >
        Registrarse como Freelancer
      </button>
      <button
        class="px-6 py-2 rounded-full border border-grisoscuro text-grisoscuro bg-white hover:bg-grisclaro transition cursor-pointer"
      >
        Registrarse como cliente
      </button>
    </div>
  </div>
</div>
