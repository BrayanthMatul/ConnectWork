<div class="flex flex-1 flex-col bg-fondo font-rubik">
  <div class="mt-5 px-8">
    <app-logo> </app-logo>
  </div>
  <div class="flex-1 flex flex-col items-center justify-center">
    <div class="w-95 bg-white rounded-xl shadow-lg p-8 flex flex-col font-rubik">
      <div class="flex flex-col items-center">
        <h1 class="text-2xl font-bold text-moradoclaro mb-2">Datos Iniciales para Freelancer</h1>
        <p class="text-grisoscuro mb-6">
          Ingrese los datos solicitado, estos datos son necesarios para acceder a la plataforma
        </p>
      </div>
      <form (submit)="$event.preventDefault(); onSubmit()" class="flex flex-col gap-3">
        <div class="flex flex-1 flex-col gap-2">
          <p class="text-grisoscuro">Descripcion o biografia</p>
          <textarea
            type="text"
            [value]="biografia()"
            (input)="biografia.set(txtBiografia.value)"
            #txtBiografia
            name="biografia"
            placeholder="Biografia"
            class="w-full px-4 py-2 mb-2 border border-grisclaro focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
            required
            rows="4"
          ></textarea>
          <p class="text-grisoscuro">Nivel Experiencia</p>
          <select
            [value]="nivleExperiencia()"
            (change)="nivleExperiencia.set(txtNivelExperiencia.value)"
            #txtNivelExperiencia
            name="nivel_experiencia"
            class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
            required
          >
            <option value="" disabled>Seleccione su nivel de experiencia</option>
            <option value="Principiante">Junior</option>
            <option value="Intermedio">Semi-Senior</option>
            <option value="Avanzado">Senior</option>
          </select>
          <p class="text-grisoscuro">Tarifa por hora (referencial)</p>
          <input
            type="number"
            [value]="tarifaHora()"
            (input)="tarifaHora.set(+txtTarifaHora.value)"
            #txtTarifaHora
            name="tarifa_hora"
            placeholder="Ejemplo: 20.00"
            class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
            required
            step="0.5"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2 rounded-full border-2 border-moradooscuro text-moradooscuro font-bold transition hover:bg-moradooscuro hover:text-white cursor-pointer mt-2"
        >
          Ingresar
        </button>
      </form>
    </div>
  </div>
</div>
