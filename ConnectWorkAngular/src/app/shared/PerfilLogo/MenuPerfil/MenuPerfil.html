<div class="w-56 rounded-lg border border-gray-200 bg-white shadow-lg">
  <ul class="list-none space-y-1 p-2 m-0">
    @for (opcion of opcionesMenuPerfil(); track opcion) {
      <li>
        <a
          [routerLink]="opcion.ruta"
          routerLinkActive="text-moradooscuro"
          (click)="cerrarOverlay()"
          class="block rounded px-4 py-2 text-grisoscuro transition hover:bg-gray-100 hover:text-moradooscuro"
        >
          {{ opcion.etiqueta }}
        </a>
      </li>
    }

    <li>
      <a
        (click)="cerrarSesion()"
        class="block rounded px-4 py-2 text-grisoscuro transition hover:bg-gray-100 hover:text-moradooscuro cursor-pointer"
      >
        Cerrar Sesión
      </a>
    </li>
  </ul>
</div>
