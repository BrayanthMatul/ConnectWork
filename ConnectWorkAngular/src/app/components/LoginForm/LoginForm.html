<!-- Card de login -->
<div class="w-95 max-w-md bg-white rounded-xl shadow-lg p-8 flex flex-col gap-4 font-rubik">
  <div class="flex flex-col items-center">
    <h2 class="text-xl font-bold text-moradoclaro p-2">Iniciar Sesion</h2>
  </div>

  <form
    (submit)="$event.preventDefault(); onSubmit()"
    class="w-full flex flex-col gap-2 font-rubik"
  >
    <p class="text-grisoscuro">Nombre de usuario / Correo</p>
    <input
      type="text"
      [value]="username()"
      (input)="username.set(txtUsername.value)"
      #txtUsername
      name="username"
      placeholder="Nombre de usuario / Correo"
      class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
      required
    />
    <p class="text-grisoscuro">Contraseña</p>
    <input
      type="password"
      [value]="password()"
      (input)="password.set(txtPassword.value)"
      #txtPassword
      name="password"
      placeholder="Contraseña"
      class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
      required
    />
    <button
      type="submit"
      class="w-full py-2 rounded-full border-2 border-moradooscuro text-moradooscuro font-bold transition hover:bg-moradooscuro hover:text-white cursor-pointer"
    >
      Entrar
    </button>
    <p class="text-red-500 mt-2">{{ mensajeError() }}</p>
  </form>
</div>
