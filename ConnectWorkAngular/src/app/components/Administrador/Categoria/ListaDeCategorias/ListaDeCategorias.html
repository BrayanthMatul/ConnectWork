@if (categorias().length > 0) {
  <div class="flex flex-col items-center">
    <h2 class="text-2xl font-bold text-moradoclaro mb-2">Lista de Categorias</h2>
  </div>
  <section class="w-full bg-white rounded-xl shadow-lg p-8 font-rubik">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-separate border-spacing-y-2">
        <thead>
          <tr class="text-moradooscuro">
            <th class="px-4 py-3 font-normal">Nombre</th>
            <th class="px-4 py-3 font-normal">Descripción</th>
            <th class="px-4 py-3 font-normal">Estado</th>
          </tr>
        </thead>
        <tbody>
          @for (categoria of categorias(); track categoria.id) {
            <tr class="bg-fondo hover:bg-grisclaro/30 transition-colors duration-200">
              <td class="px-4 py-4 rounded-l-full text-grisoscuro font-medium">
                {{ categoria.nombre }}
              </td>
              <td class="px-4 py-4 text-grisoscuro">
                {{ categoria.descripcion }}
              </td>
              <td class="px-4 py-4 text-grisoscuro">
                {{ categoria.activo ? 'Activo' : 'Desactivado' }}
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </section>
} @else {
  <p class="text-grisoscuro text-center text-xl">No se han registrado categorias.</p>
}
