@if (categorias().length > 0) {
  <div class="flex flex-1 flex-col font-rubik">
    <form (submit)="$event.preventDefault(); emitirCategoriaSeleccionada()">
      <h1 class="text-2xl font-bold text-center text-moradoclaro mb-2">Editar Categoría</h1>

      <div
        class="w-95 bg-white rounded-xl shadow-lg p-8 flex flex-col font-rubik text-grisoscuro gap-5"
      >
        <p>Seleccionar categoría para editar</p>
        <select
          class="border-2 rounded-full border-grisclaro rounded px-3 py-2 focus:outline-none focus:border-moradoclaro transition"
          (change)="seleccionar(cmbCategoria.value)"
          #cmbCategoria
          required
        >
          <option value="0" disabled selected>--Seleccione una Categoría--</option>
          @for (categoria of categorias(); track categoria.id) {
            <option [value]="categoria.nombre">
              {{ categoria.nombre }}
            </option>
          }
        </select>

        <button
          class="w-full py-2 rounded-full border-2 border-moradooscuro text-moradooscuro font-bold transition hover:bg-moradooscuro hover:text-white cursor-pointer mt-2"
          type="submit"
        >
          Editar Categoría
        </button>
      </div>
    </form>
  </div>
} @else {
  <p class="text-grisoscuro text-center text-xl">
    No hay categorías registradas o activas para editar.
  </p>
}
