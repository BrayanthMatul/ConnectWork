<h1 class="text-2xl font-bold text-center text-moradoclaro mb-2">Registro de Administrador</h1>

<div class="w-95 bg-white rounded-xl shadow-lg p-8 flex flex-col font-rubik">
  <form (submit)="$event.preventDefault(); registrarUsuario()" class="flex flex-col gap-3">
    <div class="flex flex-1 flex-row gap-10">
      <div class="flex flex-1 flex-col gap-2">
        <p class="text-grisoscuro">Nombre de usuario</p>
        <input
          type="text"
          [value]="username()"
          (input)="username.set(txtUsername.value)"
          #txtUsername
          name="username"
          placeholder="Nombre de usuario"
          class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />
        <p class="text-grisoscuro">Contraseña</p>
        <input
          type="text"
          [value]="password()"
          (input)="password.set(txtPassword.value)"
          #txtPassword
          name="password"
          placeholder="Contraseña"
          class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />
        <p class="text-grisoscuro">Nombre completo</p>
        <input
          type="text"
          [value]="nombreCompleto()"
          (input)="nombreCompleto.set(txtNombreCompleto.value)"
          #txtNombreCompleto
          name="nombreCompleto"
          placeholder="Nombre completo"
          class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />
        <p class="text-grisoscuro">Correo electrónico</p>
        <input
          type="email"
          [value]="email()"
          (input)="email.set(txtEmail.value)"
          #txtEmail
          name="email"
          placeholder="Correo electrónico"
          class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />
      </div>
    </div>

    <button
      type="submit"
      class="w-full py-2 rounded-full border-2 border-moradooscuro text-moradooscuro font-bold transition hover:bg-moradooscuro hover:text-white cursor-pointer mt-2"
    >
      Registrarse
    </button>
  </form>
</div>
