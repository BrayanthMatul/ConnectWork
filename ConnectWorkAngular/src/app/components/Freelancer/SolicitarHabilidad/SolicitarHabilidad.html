@if (categorias().length > 0) {
  <h1 class="text-2xl font-bold text-center text-moradoclaro mb-2">Solicitud de Habilidad</h1>

  <div class="w-95 bg-white rounded-xl shadow-lg p-8 flex flex-col font-rubik">
    <form (submit)="$event.preventDefault(); registrarSolicitud()" class="flex flex-col gap-3">
      <div class="flex flex-1 flex-row gap-10">
        <div class="flex flex-1 flex-col gap-2">
          <p>Seleccionar categoria</p>
          <select
            class="border-2 rounded-full border-grisclaro rounded px-3 py-2 focus:outline-none focus:border-moradoclaro transition"
            (change)="categoriaSeleccionada.set(toNumber(cmbPerfil.value))"
            #cmbPerfil
            required
          >
            <option value="0" disabled selected>--Seleccione una Categoria--</option>
            @for (categoria of categorias(); track categoria.id) {
              <option [value]="categoria.id">
                {{ categoria.nombre }}
              </option>
            }
          </select>
          <p class="text-grisoscuro">Nombre de Habilidad</p>
          <input
            type="text"
            [value]="nombre()"
            (input)="nombre.set(txtNombre.value)"
            #txtNombre
            name="nombre"
            placeholder="Nombre"
            class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
            required
          />

          <p class="text-grisoscuro">Descripción</p>
          <input
            type="text"
            [value]="descripcion()"
            (input)="descripcion.set(txtDescripcion.value)"
            #txtDescripcion
            name="descripcion"
            placeholder="Descripción"
            class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
            required
          />
        </div>
      </div>

      <button
        type="submit"
        class="w-full py-2 rounded-full border-2 border-moradooscuro text-moradooscuro font-bold transition hover:bg-moradooscuro hover:text-white cursor-pointer mt-2"
      >
        Registrar Solicitud
      </button>
    </form>
  </div>
} @else {
  <p class="text-grisoscuro text-center text-xl">
    No hay categorías registradas o activas para registrar habilidades.
  </p>
}
