<h1 class="text-2xl font-bold text-center text-moradoclaro mb-2">Envio propuesta</h1>

<div class="w-95 bg-white rounded-xl shadow-lg p-8 flex flex-col font-rubik">
  <form (submit)="$event.preventDefault(); registrarPostulacion()" class="flex flex-col gap-3">
    <div class="flex flex-1 flex-row gap-10">
      <div class="flex flex-1 flex-col gap-2">
        <p class="text-grisoscuro">Monto Ofertado</p>
        <input
          type="number"
          [value]="montoOfertado()"
          (input)="montoOfertado.set(+txtMontoOfertado.value)"
          #txtMontoOfertado
          name="montoOfertado"
          placeholder="Monto Ofertado"
          class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />

        <p class="text-grisoscuro">Plazo de Entrega (numero de dias)</p>
        <input
          type="number"
          [value]="plazoEntrega()"
          (input)="plazoEntrega.set(+txtPlazoEntrega.value)"
          #txtPlazoEntrega
          name="plazoEntrega"
          placeholder="Plazo de Entrega"
          class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />

        <p class="text-grisoscuro">Mensaje</p>
        <input
          type="text"
          [value]="mensaje()"
          (input)="mensaje.set(txtMensaje.value)"
          #txtMensaje
          name="mensaje"
          placeholder="Mensaje"
          class="w-full px-4 py-2 mb-2 border border-grisclaro rounded-full focus:outline-none focus:border-moradoclaro bg-fondo text-grisoscuro placeholder:text-grisoscuro/60"
          required
        />
      </div>
    </div>

    <button
      type="submit"
      class="w-full py-2 rounded-full border-2 border-moradooscuro text-moradooscuro font-bold transition hover:bg-moradooscuro hover:text-white cursor-pointer mt-2"
    >
      Enviar propuesta
    </button>
  </form>
</div>
