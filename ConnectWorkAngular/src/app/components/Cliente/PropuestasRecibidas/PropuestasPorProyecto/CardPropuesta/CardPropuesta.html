<div
  class="bg-white rounded-xl shadow-lg p-6 flex flex-col gap-3 font-rubik border border-grisclaro w-full"
>
  <h2 class="text-bold text-moradoclaro">{{ nombreFreelancer() }}</h2>

  <div class="flex flex-row gap-2">
    <p
      class="flex items-center gap-2 bg-moradoclaro/10 rounded-full px-3 py-1 text-sm text-moradooscuro"
    >
      Fecha: {{ propuesta().fechaHora }}
    </p>
    <p
      class="flex items-center gap-2 bg-moradoclaro/10 rounded-full px-3 py-1 text-sm text-moradooscuro"
    >
      Monto: Q. {{ propuesta().montoOfertado }}
    </p>
  </div>

  <div class="flex flex-row gap-2">
    <p
      class="flex items-center gap-2 bg-moradoclaro/10 rounded-full px-3 py-1 text-sm text-moradooscuro"
    >
      Plazo: {{ propuesta().plazoEntrega }} días
    </p>
  </div>

  <p class="text-grisoscuro">{{ propuesta().mensaje }}</p>

  <div class="flex flex-row gap-3 justify-end mt-4">
    <button
      (click)="rechazarPropuesta()"
      type="button"
      class="py-2 px-4 rounded-full border-1 border-moradooscuro text-moradooscuro transition hover:bg-moradooscuro hover:text-white cursor-pointer mt-4"
    >
      Rechazar
    </button>
    <button
      (click)="aceptarPropuesta()"
      type="button"
      class="py-2 px-4 rounded-full border-1 border-moradooscuro text-moradooscuro transition hover:bg-moradooscuro hover:text-white cursor-pointer mt-4"
    >
      Aceptar
    </button>
  </div>
</div>
