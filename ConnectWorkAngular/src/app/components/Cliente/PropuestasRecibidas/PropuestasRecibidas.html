<div class="flex flex-col gap-6">
  @for (pc of proyectosConPropuestas(); track pc.proyecto.id) {
    <app-propuestas-por-proyecto
      [propuestas]="pc.propuestas"
      [idProyecto]="pc.proyecto.id"
      (idAceptacion)="aceptarPropuesta($event)"
      (propuestasAgotadas)="eliminarGrupoPropuestas($event)"
    ></app-propuestas-por-proyecto>
  }
</div>
